<!DOCTYPE html>
<html>
<head>
    <title>VORTEX | AUTH</title>
    <style>
        body { background:#070707; color:#00ff88; font-family:monospace; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
        .box { border:1px solid #222; padding:30px; background:#0d0d0d; box-shadow: 0 0 10px #000; }
        input { background:#111; border:1px solid #333; color:#fff; padding:10px; margin:10px 0; width:220px; outline:none; }
        button { background:#00ff88; border:none; padding:10px; width:100%; cursor:pointer; font-weight:bold; }
        .label { font-size:10px; color:#555; text-transform:uppercase; }
    </style>
</head>
<body>
    <div class="box">
        <div style="font-size:18px; margin-bottom:15px;">LOGIN_GATE_v4</div>
        <div class="label">Username</div>
        <input type="text" id="u" placeholder="root">
        <div class="label">Webhook</div>
        <input type="text" id="w" placeholder="https://discord.com/api/webhooks/...">
        <button onclick="auth()">START_TERMINAL</button>
    </div>
    <script>
        function auth() {
            const w = document.getElementById('w').value;
            if(w.includes("discord.com")) {
                localStorage.setItem('hk', w);
                window.location.href='dashboard.html';
            } else { alert("INVALID_HOOK"); }
        }
    </script>
</body>
</html>
